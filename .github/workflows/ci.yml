# CI: unit tests, package + verify, integration tests (builder smoke), push image, release notes.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "buildpacks/rust/**"
      - "buildpacks/builder-jammy-base/smoke/rust_test.go"
      - "buildpacks/builder-jammy-base/smoke/testdata/rust/**"
      - "buildpacks/builder-jammy-base/smoke/testdata/rust-workspace/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "buildpacks/rust/**"
      - "buildpacks/builder-jammy-base/smoke/rust_test.go"
      - "buildpacks/builder-jammy-base/smoke/testdata/rust/**"
      - "buildpacks/builder-jammy-base/smoke/testdata/rust-workspace/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (default: from buildpack.toml)"
        required: false

env:
  IMAGE: ghcr.io/octopilot/rust

jobs:
  unit:
    name: Unit tests (detect)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set working directory
        id: wd
        run: |
          if [[ -d buildpacks/rust ]]; then
            echo "dir=buildpacks/rust" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Detect passes when Cargo.toml present
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          export CNB_BUILD_DIR="$PWD/testdata/detect-app"
          ./bin/detect
          echo "detect exit (expect 0): $?"

      - name: Detect fails when Cargo.toml absent
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          export CNB_BUILD_DIR="$(mktemp -d)"
          code=0; (set +e; ./bin/detect) || code=$?
          [[ $code -eq 100 ]] || { echo "expected exit 100, got $code"; exit 1; }

  test:
    name: Package + verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set working directory
        id: wd
        run: |
          if [[ -d buildpacks/rust ]]; then
            echo "dir=buildpacks/rust" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Cache key for buildpack tools
        id: cache-key
        run: |
          TOOLS_JSON="${{ steps.wd.outputs.dir }}/scripts/.util/tools.json"
          echo "key=buildpack-tools-${{ runner.os }}-$(md5sum "$TOOLS_JSON" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Cache buildpack tools (jam, pack)
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ${{ steps.wd.outputs.dir }}/.bin
          key: ${{ steps.cache-key.outputs.key }}

      - name: Get version from buildpack.toml
        id: version
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package buildpack
        working-directory: ${{ steps.wd.outputs.dir }}
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Verify buildpack.tgz
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          test -f build/buildpack.tgz
          tar tzf build/buildpack.tgz | head -5

  check-builder:
    name: Check builder present
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [[ -f buildpacks/builder-jammy-base/smoke/rust_test.go ]]; then
            echo "has_builder=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_builder=false" >> "$GITHUB_OUTPUT"
          fi

  integration:
    name: Integration (Rust smoke)
    needs: [unit, test, check-builder]
    if: needs.check-builder.outputs.has_builder == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set working directory (rust)
        id: wd
        run: |
          if [[ -d buildpacks/rust ]]; then
            echo "dir=buildpacks/rust" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Package Rust buildpack
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
          ./scripts/package.sh --version "$V"

      - name: Create test builder with local Rust buildpack
        run: |
          BUILDER_ROOT="buildpacks/builder-jammy-base"
          RUST_TGZ="${{ steps.wd.outputs.dir }}/build/buildpack.tgz"
          mkdir -p "$BUILDER_ROOT/.local-buildpacks"
          cp "$RUST_TGZ" "$BUILDER_ROOT/.local-buildpacks/rust.tgz"
          # file:// relative to config file dir (pack resolves from builder-test.toml location)
          sed -e 's|uri = "docker://ghcr.io/octopilot/rust:[^"]*"|uri = "file://.local-buildpacks/rust.tgz"|' \
              "$BUILDER_ROOT/builder.toml" > "$BUILDER_ROOT/builder-test.toml"

      - name: Setup Go (builder-jammy-base)
        uses: actions/setup-go@v6
        with:
          go-version-file: buildpacks/builder-jammy-base/go.mod

      - name: Install Pack
        run: |
          version=$(jq -r .pack buildpacks/builder-jammy-base/scripts/.util/tools.json)
          version=${version#v}
          curl -sSL "https://github.com/buildpacks/pack/releases/download/v${version}/pack-v${version}-linux.tgz" | tar -C /tmp -xzf -
          sudo mv /tmp/pack /usr/local/bin/
          pack version

      - name: Create builder
        working-directory: buildpacks/builder-jammy-base
        run: pack builder create testbuilder --config builder-test.toml

      - name: Run Rust smoke tests
        working-directory: buildpacks/builder-jammy-base
        run: |
          GOMAXPROCS=4 go test -count=1 -timeout 300s ./smoke/... -v -run "TestSmoke/Smoke/Rust" --name "testbuilder"

  push:
    name: Package and Push
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set working directory
        id: wd
        run: |
          if [[ -d buildpacks/rust ]]; then
            echo "dir=buildpacks/rust" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        id: version
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
            echo "version=${V}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package buildpack
        working-directory: ${{ steps.wd.outputs.dir }}
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        working-directory: ${{ steps.wd.outputs.dir }}
        run: ./scripts/publish.sh --image-ref "${{ env.IMAGE }}:${{ steps.version.outputs.version }}"

  release-notes:
    name: Publish GitHub Release
    needs: push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Previous Tag
        id: prev_tag
        uses: octopilot/actions/previous-tag@main
        with:
          fallback: "v0.0.0"

      - name: Generate Release Notes
        id: release_notes
        uses: octopilot/actions/release@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          version: ${{ github.ref_name }}
          since_tag: ${{ steps.prev_tag.outputs.tag }}
          provider: anthropic

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.body_file }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
