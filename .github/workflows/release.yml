# Trigger release: bump version in buildpack.toml, tag, push, and create GitHub release.
# Same pattern as octopilot-pipeline-tools (uses reusable workflow + bump-version with buildpack mode).
# Requires secrets.REPO_PAT (org-level PAT with contents:write) so the push triggers CI (push-buildpackage).
# Checkout is the rust buildpack repo; bump-version uses buildpack.toml at repo root.
name: Trigger Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type (patch, minor, major)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      token:
        description: "GitHub Token (PAT) to trigger CI. Leave empty to use secrets.REPO_PAT."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    uses: octopilot/octopilot-workflows/.github/workflows/workflow-release.yml@main
    with:
      mode: buildpack
      bump: ${{ github.event.inputs.bump }}
    secrets:
      repo_token: ${{ github.event.inputs.token || secrets.REPO_PAT }}
